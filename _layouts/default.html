<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/potted-plant-icon.png">
  <title>{{ page.title }}</title>
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <meta name="description" content="{% if page.description %}{{ page.description | strip | strip_newlines | truncate: 160 }}{% else %}{{ page.title }}{% endif %}">
  <meta property="og:site_name" content="{{ page.title }}">
  <meta property="og:locale" content="en_US">
  {% if page.date %}
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="{{ site.url }}/">
  {% endif %}
  {% if page.description %}
  <meta property="og:description" content="{{ page.description | strip_newlines | strip | truncate: 160 }}">
  {% else %}
  <meta property="og:description" content="{{ page.title | strip_newlines | truncate: 160 }}">
  {% endif %}
  {% if page.url == "/" %}
  <meta property="og:url" content="{{ site.url }}">
  {% else %}
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% endif %}
  <meta name="robots" content="index,follow">
  <!-- Apply saved theme before paint to avoid flash -->
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/css/main.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ page.ga_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ page.ga_id }}');
  </script>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/">Nahuel Yazbek</a>
    <nav>
      <a href="/about/">About</a>
      <a href="/wiki/">Wiki</a>
      <a href="/blog/">Blog</a>
      <a href="/games/">Games</a>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <ul>
      <li><a href="mailto:nahuelayazbek@gmail.com" title="Email"><i class="far fa-envelope"></i></a></li>
      <li><a href="https://github.com/nyazbek" rel="me" title="GitHub"><i class="fab fa-github"></i></a></li>
      <li><a href="http://twitter.com/nahbek" rel="me" title="Twitter"><i class="fab fa-twitter"></i></a></li>
      <li><a href="https://www.linkedin.com/in/nahuel-yazbek-00b44a217/" rel="me" title="LinkedIn"><i class="fab fa-linkedin"></i></a></li>
    </ul>
    <p>Nahuel Yazbek &middot; <a href="https://github.com/nyazbek/nyazbek.github.io">Source</a></p>
  </footer>

  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme') || 'warm';
        var next = current === 'dark' ? 'warm' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
  <script defer src="https://kit.fontawesome.com/695103c91f.js" crossorigin="anonymous"></script>
  {% if page.uses_mathjax %}
  <script defer src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>
  {% endif %}
</body>
</html>
